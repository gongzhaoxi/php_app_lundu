{extend name="common/layout" /}
{block name="body"}
<div class="container">
	 <div class="layui-card">
		<div class="layui-card-body" style="padding-bottom: 0;">
			<div class="layui-btn-container">
				<a  class="layui-btn layui-btn-sm" href="{:url('index')}">按班次统计</a> 
				<a  class="layui-btn  layui-btn-sm" href="{:url('dateStat')}">按日统计</a> 
				<a  class="layui-btn  layui-btn-sm" href="{:url('monthStat')}">按月统计</a> 
				<a  class="layui-btn  layui-btn-sm" href="{:url('yearStat')}">按年统计</a> 
			</div>
		</div>
	</div>
    <!-- 搜索栏 -->
    <form class="layui-form layui-search">
        <div class="layui-form-item">
            <div class="layui-inline">
                <label for="name" class="layui-form-label">日期：</label>
                <div class="layui-input-inline">
                    <input type="text" id="sailing_date" name="sailing_date"  value="{$date}"  class="layui-input" placeholder="请输入日期" autocomplete="off">
                </div>
            </div>
            <div class="layui-inline">
                <a class="layui-btn layui-btn-sm layui-btn-default" lay-submit lay-filter="search">查询</a>
                <a class="layui-btn layui-btn-sm layui-btn-primary" lay-submit lay-filter="clear-search">重置</a>
				<a class="layui-btn layui-btn-sm layui-btn-default export" >导出</a>
            </div>
        </div>
    </form>

    <!-- 表格栏 -->
    <div class="layui-card">
        <div class="layui-card-body">
            <table id="wait-table-list" lay-filter="wait-table-list"></table>
            <script type="text/html" id="toolbar">
                <div class="layui-btn-container">
                    <a class="layui-btn layui-btn-sm layui-btn-default {:check_perms('add')}" lay-event="add">
                        <i class="layui-icon icon-add"></i>
                        <span>新增</span>
                    </a>
                </div>
            </script>
            <script type="text/html" id="table-is_show">
                {{#  if(d.is_show === 0){ }}
                    <span class="color-success"><i class="layui-icon layui-icon-circle-dot" lay-tips="正常"></i></span>
                {{# } else { }}
                    <span class="color-warning"><i class="layui-icon layui-icon-circle-dot" lay-tips="禁用"></i></span>
                {{#  } }}
            </script>
            <script type="text/html" id="table-is_delete">
                {{#  if(d.is_delete === 0){ }}
                    <span class="color-success"><i class="layui-icon layui-icon-circle-dot" lay-tips="正常"></i></span>
                {{# } else { }}
                    <span class="color-warning"><i class="layui-icon layui-icon-circle-dot" lay-tips="禁用"></i></span>
                {{#  } }}
            </script>
            <script type="text/html" id="table-operate">
                <button type="button" class="layui-btn layui-btn-xs layui-btn-default {:check_perms('edit')}" lay-event="edit">
                    <i class="layui-icon icon-edit"></i>
                </button>
                <button type="button" class="layui-btn layui-btn-xs layui-btn-danger {:check_perms('del')}" lay-event="del">
                    <i class="layui-icon icon-del"></i>
                </button>
            </script>
        </div>
    </div>
</div>
{/block}

 

{block name="js"}
<script>
    layui.use(['laydate'],function() {
		layui.laydate.render({elem: '#sailing_date', type: 'date', range: '至',trigger: 'click'});
        // 渲染表格
        let table = waitUtil.table({
            elem: '#wait-table-list'
            ,url: '{:route("Sailing/index")}?sailing_date={$date}'
			,toolbar:false
            ,defaultToolbar: false
			,height:'full-210'
            ,cols: [[
                {type:"numbers",title:'序号', width:60, align:'center'},
				{field:'push_time', title:'提交时间', align:'center'},
				{field:'remark', title:'船号', align:'center'},
				{field:'name', title:'航班名称', align:'center'},
				{field:'sailing_time', title:'班次', align:'center'},
                {field:'car_num', title:'车次', align:'center'},
				{field:'human_num', title:'人次', align:'center'},
				{field:'push_by', title:'提交人', align:'center'},
				{field:'confirm_by', title:'确认人', align:'center'},
				{field:'confirm_time', title:'确认时间', align:'center'},
            ]]
        });
		
		$('.export').click(function(){
			exportData(layui.form.val('layui-search'),'{:route("Sailing/export")}',10000);
		})


        // 逻辑事件
        waitUtil.event({
            add: function () {
                waitUtil.popup({
                    title: '新增',
                    url: '{:route("Sailing/add")}',
                    area: ['90%', '90%'],
                    success: function (layero, index) {
                        layero.layui.form.on('submit(addForm)', function(data) {
                            waitUtil.locking(this);
                            waitUtil.ajax({
                                url: '{:route("Sailing/add")}',
                                type: 'POST',
                                data: data.field
                            }).then((res) => {
                                waitUtil.unlock(this);
                                if (res.code === 0) {
                                    table.reload({page: {curr: 1}});
                                    layer.close(index);
                                }
                            }).catch(() => {
                                waitUtil.unlock(this);
                            });
                        });
                    }
                });
            },
            edit: function (obj) {
                waitUtil.popup({
                    title: '编辑',
                    url: '{:route("Sailing/edit")}?id='+obj.data.id,
                    area: ['90%', '90%'],
                    success: function (layero, index) {
                        layero.layui.form.on('submit(addForm)', function(data) {
                            waitUtil.locking(this);
                            data.field['id'] = obj.data.id;
                            waitUtil.ajax({
                                url: '{:route("Sailing/edit")}',
                                type: 'POST',
                                data: data.field
                            }).then((res) => {
                                waitUtil.unlock(this);
                                if (res.code === 0) {
                                    table.reload();
                                    layer.close(index);
                                }
                            }).catch(() => {
                                waitUtil.unlock(this);
                            });
                        });
                    }
                });
            },
            del: function (obj) {
                layer.confirm('确定要删除此项数据吗？', function(index) {
                    layer.close(index);
                    waitUtil.ajax({
                        url: '{:route("Sailing/del")}',
                        type: 'POST',
                        data: {id: obj.data.id}
                    }).then((res) => {
                        if (res.code === 0) {
                            table.reload();
                        }
                    });
                });
            }
        });

 
        // 搜索事件
        waitUtil.search(table);
    });

</script>
{/block}
