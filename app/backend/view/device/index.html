{extend name="common/layout" /}
 
{block name="body"}
<div class="container">
    <!-- 搜索栏 -->
    <form class="layui-form layui-search">
        <div class="layui-form-item">
            <div class="layui-inline">
                <label for="type" class="layui-form-label">进出类别：</label>
                <div class="layui-input-inline">
                    <select id="type" name="type">
                        <option value="" selected>全部</option>
						{foreach $type as $k=>$v}
						<option value="{$k}">{$v}</option>
						{/foreach}
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <label for="category" class="layui-form-label">识别类型：</label>
                <div class="layui-input-inline">
                    <select id="category" name="category">
                        <option value="" selected>全部</option>
						{foreach $category as $k=>$v}
						<option value="{$k}">{$v}</option>
						{/foreach}
                    </select>
                </div>
            </div>
            <div class="layui-inline">
                <label for="sn" class="layui-form-label">设备ID：</label>
                <div class="layui-input-inline">
                    <input type="text" id="sn" name="sn"
                        class="layui-input" placeholder="请输入设备ID" autocomplete="off">
                </div>
            </div>
            <div class="layui-inline">
                <label for="is_show" class="layui-form-label">是否显示:</label>
                <div class="layui-input-inline">
                    <select id="is_show" name="is_show">
                        <option value="" selected>全部</option>
                        <option value="1">是</option>
                        <option value="0">否</option>
                    </select>
                </div>
            </div>

            <div class="layui-inline">
                <a class="layui-btn layui-btn-sm layui-btn-default" lay-submit lay-filter="search">查询</a>
                <a class="layui-btn layui-btn-sm layui-btn-primary" lay-submit lay-filter="clear-search">重置</a>
            </div>
        </div>
    </form>

    <!-- 表格栏 -->
    <div class="layui-card">
        <div class="layui-card-body">
            <table id="wait-table-list" lay-filter="wait-table-list"></table>
            <script type="text/html" id="toolbar">
                <div class="layui-btn-container">
                    <a class="layui-btn layui-btn-sm layui-btn-default {:check_perms('add')}" lay-event="add">
                        <i class="layui-icon icon-add"></i>
                        <span>新增</span>
                    </a>
                </div>
            </script>
            <script type="text/html" id="table-is_show">
                {{#  if(d.is_show === 0){ }}
                    <span class="color-success"><i class="layui-icon layui-icon-circle-dot" lay-tips="正常"></i></span>
                {{# } else { }}
                    <span class="color-warning"><i class="layui-icon layui-icon-circle-dot" lay-tips="禁用"></i></span>
                {{#  } }}
            </script>
            <script type="text/html" id="table-operate">
                <button type="button" class="layui-btn layui-btn-xs layui-btn-default {:check_perms('edit')}" lay-event="edit">
                    <i class="layui-icon icon-edit"></i>
                </button>
                <button type="button" class="layui-btn layui-btn-xs layui-btn-danger {:check_perms('del')}" lay-event="del">
                    <i class="layui-icon icon-del"></i>
                </button>
            </script>
        </div>
    </div>
</div>
{/block}

 

{block name="js"}
<script>
    layui.use(function() {
        // 渲染表格
        let table = waitUtil.table({
            elem: '#wait-table-list'
            ,url: '{:route("Device/index")}'
            ,cols: [[
                {field:'id', title:'主键', width:60, align:'center'},
                {field:'type_text', title:'进出类别', align:'center'},
                {field:'category_text', title:'识别类型', align:'center'},
                {field:'sn', title:'设备ID', align:'center'},
                {field:'is_show', title:'是否显示', width:100, align:'center', templet:'#table-is_show'},
                {field:'remark', title:'备注', align:'center'},
                {fixed:'right', title:'操作', width:90, align:'center', toolbar:'#table-operate'}
            ]]
        });
 

        // 逻辑事件
        waitUtil.event({
            add: function () {
                waitUtil.popup({
                    title: '新增',
                    url: '{:route("Device/add")}',
                    area: ['90%', '90%'],
                    success: function (layero, index) {
                        layero.layui.form.on('submit(addForm)', function(data) {
                            waitUtil.locking(this);
                            waitUtil.ajax({
                                url: '{:route("Device/add")}',
                                type: 'POST',
                                data: data.field
                            }).then((res) => {
                                waitUtil.unlock(this);
                                if (res.code === 0) {
                                    table.reload({page: {curr: 1}});
                                    layer.close(index);
                                }
                            }).catch(() => {
                                waitUtil.unlock(this);
                            });
                        });
                    }
                });
            },
            edit: function (obj) {
                waitUtil.popup({
                    title: '编辑',
                    url: '{:route("Device/edit")}?id='+obj.data.id,
                    area: ['90%', '90%'],
                    success: function (layero, index) {
                        layero.layui.form.on('submit(addForm)', function(data) {
                            waitUtil.locking(this);
                            data.field['id'] = obj.data.id;
                            waitUtil.ajax({
                                url: '{:route("Device/edit")}',
                                type: 'POST',
                                data: data.field
                            }).then((res) => {
                                waitUtil.unlock(this);
                                if (res.code === 0) {
                                    table.reload();
                                    layer.close(index);
                                }
                            }).catch(() => {
                                waitUtil.unlock(this);
                            });
                        });
                    }
                });
            },
            del: function (obj) {
                layer.confirm('确定要删除此项数据吗？', function(index) {
                    layer.close(index);
                    waitUtil.ajax({
                        url: '{:route("Device/del")}',
                        type: 'POST',
                        data: {id: obj.data.id}
                    }).then((res) => {
                        if (res.code === 0) {
                            table.reload();
                        }
                    });
                });
            }
        });

 
        // 搜索事件
        waitUtil.search(table);
    });
</script>
{/block}
